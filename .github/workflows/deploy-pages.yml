name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static app
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Resolve Vite base path
        shell: bash
        run: |
          if [ -n "${PAGES_BASE_PATH:-}" ]; then
            BASE_PATH="$PAGES_BASE_PATH"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"

            if [ "$REPO_NAME" = "$OWNER_NAME.github.io" ]; then
              BASE_PATH="/"
            else
              BASE_PATH="/$REPO_NAME/"
            fi
          fi

          echo "VITE_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "Using Vite base path: $BASE_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Add SPA fallback for direct route refreshes
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy static app
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
